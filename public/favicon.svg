<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2"/>
    </filter>
    <filter id="boxShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.4" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.39  0 0 0 0 0.4  0 0 0 0 0.96  0 0 0 0.55 0"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="1" y="1" width="62" height="62" rx="15" fill="#060913"/>
  <rect x="1" y="1" width="62" height="62" rx="15" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- ambient glow, echoing the app's header radial gradient -->
  <ellipse cx="32" cy="14" rx="30" ry="20" fill="url(#glow)" filter="url(#softBlur)"/>

  <!-- ghost checkboxes hinting at the grid of a million -->
  <rect x="8" y="8" width="9" height="9" rx="2.2" fill="none" stroke="rgba(148,163,184,0.38)" stroke-width="1.6"/>
  <rect x="46" y="9" width="8" height="8" rx="2" fill="none" stroke="rgba(148,163,184,0.30)" stroke-width="1.4"/>
  <rect x="9" y="46" width="8" height="8" rx="2" fill="none" stroke="rgba(148,163,184,0.30)" stroke-width="1.4"/>

  <!-- glow behind the main checked box -->
  <rect x="20" y="20" width="28" height="28" rx="7.5" fill="#6366f1" filter="url(#boxShadow)"/>

  <!-- the hero checkbox -->
  <rect x="20.5" y="20.5" width="27" height="27" rx="7" fill="url(#checkGrad)"/>
  <rect x="20.5" y="20.5" width="27" height="27" rx="7" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>

  <path d="M 26.5 35 L 31.5 40.5 L 42 26.5"
        fill="none" stroke="#f8fafc" stroke-width="4.4"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
